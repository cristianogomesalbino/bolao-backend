sonar.projectKey=cristianogomesalbino_bolao-backend
sonar.organization=cristianogomesalbino

sonar.sources=src
sonar.tests=test
sonar.test.inclusions=**/*.spec.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Exclusões de coverage — arquivos de infraestrutura/declarativos sem lógica testável
sonar.coverage.exclusions=\
  src/main.ts,\
  src/**/*.module.ts,\
  src/**/prisma-*.ts,\
  src/prisma/**,\
  src/**/*.constants.ts,\
  src/**/*.dto.ts,\
  src/**/*.decorator.ts,\
  src/**/*.filter.ts,\
  src/**/*.pipe.ts,\
  src/**/*.middleware.ts,\
  src/**/*.presenter.ts,\
  src/common/errors/**