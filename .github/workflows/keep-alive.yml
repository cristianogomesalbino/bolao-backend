name: Keep Alive (Render)

on:
  schedule:
    # A cada 14 minutos, das 7h às 23h (UTC-3 = 10h-02h UTC)
    - cron: '*/14 10-23 * * *'
    - cron: '*/14 0-2 * * *'
  workflow_dispatch: # permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 60 "${{ secrets.RENDER_HEALTH_URL }}/health" || echo "Server warming up..."
