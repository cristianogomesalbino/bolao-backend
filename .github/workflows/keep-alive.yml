name: Keep Alive (Render HML)

on:
  schedule:
    # A cada 10 minutos, das 7h às 23h BRT (10h-02h UTC)
    - cron: '*/10 10-23 * * *'
    - cron: '*/10 0-2 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 120 --retry 2 --retry-delay 30 \
            "${{ secrets.RENDER_HEALTH_URL }}/health" \
            && echo "Server is up" \
            || echo "Server warming up (cold start)"
