name: Pre-Build Validation

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build TypeScript
        run: npx nest build

      - name: Verify entrypoint exists
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ ERRO: dist/main.js não encontrado após build!"
            echo "Arquivos em dist/:"
            find dist -name "*.js" | head -20
            exit 1
          fi
          echo "✅ dist/main.js encontrado"

      - name: Verify entrypoint loads without crash
        run: node -e "require('./dist/main.js')" &
          PID=$!
          sleep 3
          kill $PID 2>/dev/null || true
          echo "✅ Entrypoint carrega sem erro de módulo"

      - name: Run tests
        run: npx vitest run
